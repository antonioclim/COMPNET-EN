name: CI

on:
  push:
  pull_request:

jobs:
  qa:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check executable permissions (Phase 4)
        run: bash 00_TOOLS/qa/check_executability.sh

      - name: Run Markdown link checker
        run: python 00_TOOLS/qa/check_markdown_links.py

      - name: Run language & lexical integrity check (Phase 7)
        run: python 00_TOOLS/qa/check_integrity.py

      - name: Validate lecture figure targets (Phase 8)
        run: python 00_TOOLS/qa/check_fig_targets.py --puml-only

      - name: Run pytest (if present)
        shell: bash
        run: |
          set -euo pipefail

          if find . -type f \( -name 'test_*.py' -o -name '*_test.py' \) -print -quit | grep -q .; then
            python -m pip install --upgrade pip
            python -m pip install pytest pyyaml
            python -m pytest -q
          else
            echo "No pytest tests detected, skipping."
          fi
