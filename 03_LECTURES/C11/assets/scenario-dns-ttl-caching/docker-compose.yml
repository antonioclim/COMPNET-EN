services:
  auth:
    image: internetsystemsconsortium/bind9:9.18
    volumes:
      - ./auth:/etc/bind
    networks: [dnsnet]
    healthcheck:
      test: ["CMD-SHELL", "grep -q '^named$' /proc/1/comm"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  resolver:
    image: mvance/unbound:1.20.0
    volumes:
      - ./resolver:/opt/unbound/etc/unbound
    depends_on:
      auth:
        condition: service_healthy
    networks: [dnsnet]
    healthcheck:
      test: ["CMD-SHELL", "grep -q '^unbound$' /proc/1/comm"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  client:
    build: ./client
    working_dir: /app
    volumes:
      - ./client:/app
    depends_on:
      resolver:
        condition: service_healthy
    command: ["python", "query.py"]
    networks: [dnsnet]

networks:
  dnsnet:
