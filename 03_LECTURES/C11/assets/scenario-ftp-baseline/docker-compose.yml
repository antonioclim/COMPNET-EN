services:
  ftp:
    build: ./server
    working_dir: /app
    volumes:
      - ./server:/app
      - ./data:/data
    command: ["python", "ftp_server.py"]
    ports:
      - "2121:2121"
      - "30000-30009:30000-30009"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import socket,sys; s=socket.socket(); s.settimeout(1); sys.exit(0 if s.connect_ex(('127.0.0.1',2121))==0 else 1)"
      interval: 3s
      timeout: 2s
      retries: 25
      start_period: 3s

  client:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./client:/app
    depends_on:
      ftp:
        condition: service_healthy
    command: ["python", "ftp_client.py"]
