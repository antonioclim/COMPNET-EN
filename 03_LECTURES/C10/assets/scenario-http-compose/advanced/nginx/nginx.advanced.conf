events {}

http {
  # ── Rate limiting (per client IP) ──────────────────────────
  # 2 requests/sec with a small burst allowance.
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=2r/s;

  # ── Proxy cache for the API ────────────────────────────────
  # Cache lives inside the container (educational; not persistent).
  proxy_cache_path /var/cache/nginx
    levels=1:2
    keys_zone=api_cache:10m
    max_size=50m
    inactive=60s
    use_temp_path=off;

  upstream web_upstream {
    server web:8000 max_fails=2 fail_timeout=5s;
    server web2:8000 max_fails=2 fail_timeout=5s;
  }

  upstream api_upstream {
    server api:5000;
  }

  server {
    listen 80;

    add_header X-Debug-Proxy "nginx-advanced" always;

    # Entry point: redirect to /app/
    location = / {
      return 302 /app/;
    }

    # Serve web app under /app/, but backend serves at /
    location /app/ {
      rewrite ^/app/(.*)$ /$1 break;

      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Fail over on common transient errors.
      proxy_next_upstream error timeout http_502 http_503 http_504;

      proxy_pass http://web_upstream;
    }

    # API under /api/
    location /api/ {
      rewrite ^/api/(.*)$ /$1 break;

      # Rate limit API calls (classic reverse proxy protection pattern)
      limit_req zone=api_limit burst=5 nodelay;

      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Basic caching for GET requests (especially useful for /users in this demo)
      proxy_cache api_cache;
      proxy_cache_key "$scheme$proxy_host$request_uri";
      proxy_cache_valid 200 10s;
      proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
      add_header X-Cache-Status $upstream_cache_status always;

      proxy_pass http://api_upstream;
    }
  }
}
