events {}

http {
  upstream web_upstream {
    server web1:8000;
    server web2:8000;
  }

  upstream api_upstream {
    server api:5000;
  }

  server {
    listen 80;

    add_header X-Debug-Proxy "nginx-week14" always;

    # Entry point: redirect to /app/
    location = / {
      return 302 /app/;
    }

    # Serve the web app under /app/, backend serves at /
    location /app/ {
      rewrite ^/app/(.*)$ /$1 break;

      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_pass http://web_upstream;
    }

    # API under /api/
    location /api/ {
      rewrite ^/api/(.*)$ /$1 break;

      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_pass http://api_upstream;
    }
  }
}
