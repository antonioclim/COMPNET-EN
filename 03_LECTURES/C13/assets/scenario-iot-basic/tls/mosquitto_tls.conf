# mosquitto TLS listener (optional) — loaded via include_dir
#
# This file is mounted by docker-compose.tls.yml under:
#   /mosquitto/config/conf.d/99_tls.conf
#
# Default plaintext listener (1883) remains configured in mosquitto.conf.
#
# Demo certificates:
#   - CA:     /mosquitto/certs/ca/ca.crt
#   - Server: /mosquitto/certs/server/server.crt
#   - Key:    /mosquitto/certs/server/server.key

listener 8883
protocol mqtt

cafile /mosquitto/certs/ca/ca.crt
certfile /mosquitto/certs/server/server.crt
keyfile /mosquitto/certs/server/server.key

# Lab-friendly settings (NOT production hardening)
allow_anonymous true
require_certificate false
